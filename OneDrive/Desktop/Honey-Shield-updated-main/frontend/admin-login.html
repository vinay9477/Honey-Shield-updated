<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | HoneyShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#03010a;--red:#ff3b6b;--violet:#7c3aed;--cyan:#00f5ff;--green:#00f5c4;--text:#e2e8f0;--muted:rgba(226,232,240,0.4);--border:rgba(255,255,255,0.07);--amber:#f59e0b}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center}

    #matrix{position:fixed;inset:0;z-index:0;opacity:0.05;pointer-events:none}
    .glow{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0}
    .glow-1{width:600px;height:600px;background:rgba(255,59,107,0.1);top:-200px;left:-100px}
    .glow-2{width:500px;height:500px;background:rgba(124,58,237,0.08);bottom:-150px;right:-100px}
    .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,59,107,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,59,107,0.02) 1px,transparent 1px);background-size:60px 60px}

    .card{
      position:relative;z-index:1;
      width:100%;max-width:440px;margin:16px;
      background:rgba(10,6,20,0.95);
      border:1px solid rgba(255,59,107,0.15);
      border-radius:20px;overflow:hidden;
      box-shadow:0 32px 80px rgba(0,0,0,0.7);
      animation:cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--violet),var(--red));background-size:300%;animation:borderFlow 3s linear infinite}
    @keyframes borderFlow{from{background-position:0%}to{background-position:300%}}

    .card-head{
      padding:28px 32px 22px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:14px;
    }
    .head-icon{width:46px;height:46px;border-radius:12px;background:rgba(255,59,107,0.1);border:1px solid rgba(255,59,107,0.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .head-eye{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,59,107,0.7);margin-bottom:4px}
    .head-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--red),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

    .card-body{padding:24px 32px;display:flex;flex-direction:column;gap:18px}

    .field{display:flex;flex-direction:column;gap:7px}
    .field label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
    .field input{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      border-radius:10px;padding:13px 14px;
      color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;
      outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
    }
    .field input:focus{border-color:rgba(255,59,107,0.4);box-shadow:0 0 0 3px rgba(255,59,107,0.06)}
    .field input::placeholder{color:rgba(226,232,240,0.2)}

    .btn-login{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--red),rgba(124,58,237,0.9));
      border:none;border-radius:10px;color:white;
      font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;
      cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(255,59,107,0.25);
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,59,107,0.4)}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

    .err-msg{
      padding:11px 14px;border-radius:8px;font-family:'JetBrains Mono',monospace;
      font-size:11px;letter-spacing:.5px;text-align:center;
      display:none;
    }
    .err-msg.error{background:rgba(255,59,107,0.1);color:var(--red);border:1px solid rgba(255,59,107,0.2);display:block}
    .err-msg.success{background:rgba(0,245,196,0.1);color:var(--green);border:1px solid rgba(0,245,196,0.2);display:block}

    .warn-box{
      background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.15);
      border-radius:8px;padding:12px 14px;
      font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;
      color:rgba(245,158,11,0.7);line-height:1.7;
    }
    .warn-box span{color:var(--amber)}

    .card-foot{
      padding:14px 32px;border-top:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
    }
    .card-foot a{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(0,245,255,0.5);text-decoration:none}
    .card-foot a:hover{color:var(--cyan)}
    .card-foot-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(255,59,107,0.5);padding:4px 10px;background:rgba(255,59,107,0.06);border:1px solid rgba(255,59,107,0.12);border-radius:5px}
  </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="grid-bg"></div>

<div class="card">
  <div class="card-head">
    <div class="head-icon">🛡️</div>
    <div>
      <div class="head-eye">// ADMIN ACCESS</div>
      <div class="head-title">Control Center</div>
    </div>
  </div>

  <div class="card-body">
    <div class="field">
      <label>// Admin Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>// Access Key</label>
      <input type="password" id="password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="err-msg" id="errMsg"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">AUTHENTICATE</button>
    <div class="warn-box">
      Restricted access. All login attempts are <span>logged and monitored</span>.<br>
      Unauthorized access is a <span>criminal offence</span>.
    </div>
  </div>

  <div class="card-foot">
    <a href="login.html">← Operator Login</a>
    <div class="card-foot-badge">ADMIN ZONE</div>
  </div>
</div>

<script>
// MATRIX
const mc=document.getElementById('matrix'),mct=mc.getContext('2d');
function rsz(){mc.width=innerWidth;mc.height=innerHeight}rsz();window.addEventListener('resize',rsz);
const chars='01アイウエオカキクケコ!@#$%^&';let cols=[];
function initC(){cols=Array.from({length:Math.floor(mc.width/16)},()=>Math.random()*-mc.height)}
initC();window.addEventListener('resize',initC);
setInterval(()=>{
  mct.fillStyle='rgba(3,1,10,.07)';mct.fillRect(0,0,mc.width,mc.height);
  mct.font='12px JetBrains Mono';
  cols.forEach((y,i)=>{
    const a=0.3+Math.random()*0.4;
    mct.fillStyle=Math.random()>.95?`rgba(255,59,107,${a})`:`rgba(124,58,237,${a*0.3})`;
    mct.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y);
    if(y>mc.height&&Math.random()>.975)cols[i]=0;cols[i]+=14;
  });
},55);

// Auto redirect
if(localStorage.getItem('admin'))window.location.href='admin-dashboard.html';

async function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const errMsg=document.getElementById('errMsg');
  const btn=document.getElementById('loginBtn');

  if(!username||!password){errMsg.className='err-msg error';errMsg.textContent='⚠ Fill in all fields';return}

  btn.disabled=true;btn.textContent='VERIFYING...';
  errMsg.className='err-msg';

  try{
    const res=await fetch('http://localhost:3000/api/admin/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(res.ok){
      errMsg.className='err-msg success';errMsg.textContent='✓ Access granted — redirecting...';
      localStorage.setItem('admin',JSON.stringify({username}));
      setTimeout(()=>window.location.href='admin-dashboard.html',1200);
    }else{
      errMsg.className='err-msg error';errMsg.textContent='✗ '+( data.message||'Invalid credentials');
      btn.disabled=false;btn.textContent='AUTHENTICATE';
    }
  }catch(e){
    errMsg.className='err-msg error';errMsg.textContent='⚠ Server unreachable';
    btn.disabled=false;btn.textContent='AUTHENTICATE';
  }
}
</script>
</body>
</html>
