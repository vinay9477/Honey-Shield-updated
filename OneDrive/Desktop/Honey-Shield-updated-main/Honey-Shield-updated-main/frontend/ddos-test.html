<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DDoS Protection Test</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #cffafe, #ecfdf5);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .test-container {
      background: #ffffff;
      width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #a5f3fc;
      color: #0c4a6e;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
      color: #111827;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #06b6d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #0891b2;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .info {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }

    .warning {
      margin-top: 10px;
      font-size: 12px;
      color: #b91c1c;
    }

    .request-counter {
      margin-top: 10px;
      font-size: 13px;
      color: #374151;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 6px;
    }

    .blocked {
      color: #b91c1c;
      background: #fee2e2;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .success {
      color: #166534;
      background: #dcfce7;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .button-group button {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="test-container">

  <span class="badge">DDoS Test</span>

  <h2>⚡ DDoS Protection Test</h2>

  <p>
    This page tests DDoS attack detection.
    Make rapid requests to trigger protection.
  </p>

  <div class="button-group">
    <button id="singleBtn" type="button">Single Request</button>
    <button id="spamBtn" type="button">Spam (Rapid)</button>
  </div>

  <div class="info">
    DDoS threshold: <b>100 requests per 10 seconds</b>
  </div>

  <div class="request-counter">
    Requests: <span id="requestCount">0</span>/100
  </div>

  <div id="result"></div>

  <div class="warning">
    This test does not affect real users or production data.
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Get userId from localStorage
  function getUserId() {
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    return user._id || user.id || user.email || "ANONYMOUS";
  }

  const ddosThreshold = { requests: 100, timeWindow: 10000 }; // 100 requests per 10 seconds
  let requestTimestamps = JSON.parse(localStorage.getItem('ddosTest')) || [];

  const singleBtn = document.getElementById("singleBtn");
  const spamBtn = document.getElementById("spamBtn");
  const resultDiv = document.getElementById("result");
  const requestCountSpan = document.getElementById("requestCount");

  function updateCounter() {
    const now = Date.now();
    requestTimestamps = requestTimestamps.filter(time => now - time < ddosThreshold.timeWindow);
    requestCountSpan.textContent = requestTimestamps.length;
    localStorage.setItem('ddosTest', JSON.stringify(requestTimestamps));
  }

  function makeRequest() {
    const now = Date.now();
    requestTimestamps = requestTimestamps.filter(time => now - time < ddosThreshold.timeWindow);

    if (requestTimestamps.length > ddosThreshold.requests) {
      resultDiv.className = "blocked";
      resultDiv.innerHTML = "<b>✗ DDoS Attack Detected!</b><br>Too many rapid requests detected. Access temporarily restricted.";

      singleBtn.disabled = true;
      spamBtn.disabled = true;

      setTimeout(() => {
        singleBtn.disabled = false;
        spamBtn.disabled = false;
        requestTimestamps = [];
        updateCounter();
      }, 3000);

      fetch("http://localhost:3000/api/logs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({userId: getUserId(),
          ip: "INTERNAL_TEST",
          type: "DDOS_ATTACK",
          message: "DDoS attack detected and blocked"
        })
      })
      .catch(err => console.error("Log error:", err));

      return false;
    }

    requestTimestamps.push(now);
    updateCounter();

    resultDiv.className = "success";
    resultDiv.innerHTML = "<b>✓ Request Accepted</b><br>Requests remaining: " + (ddosThreshold.requests - requestTimestamps.length);

    return true;
  }

  singleBtn.addEventListener("click", function () {
    makeRequest();
  });

  spamBtn.addEventListener("click", function () {
    // Make 10 rapid requests
    for (let i = 0; i < 10; i++) {
      if (!makeRequest()) {
        break;
      }
    }
  });

  updateCounter();

});
</script>
<script src="public/js/common.js"></script>

</body>
</html>
