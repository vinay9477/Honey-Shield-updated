<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | HoneyShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #03010a;
      --card:   #0d0b16;
      --border: rgba(255,255,255,0.07);
      --cyan:   #00f5ff;
      --violet: #7c3aed;
      --pink:   #f000ff;
      --text:   #e2e8f0;
      --muted:  rgba(226,232,240,0.4);
      --red:    #ff3b6b;
      --green:  #00f5c4;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }

    /* MATRIX BG */
    #matrix { position:fixed; inset:0; z-index:0; opacity:0.05; pointer-events:none; }

    /* GLOWS */
    .glow { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }
    .glow-1 { width:500px; height:500px; background:rgba(124,58,237,0.12); top:-100px; right:-100px; }
    .glow-2 { width:400px; height:400px; background:rgba(0,245,255,0.08); bottom:-100px; left:-100px; }

    /* CARD */
    .card {
      position:relative; z-index:1;
      width:100%; max-width:480px; margin:32px 16px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px; overflow:hidden;
      box-shadow:0 32px 80px rgba(0,0,0,0.6);
      animation:cardIn 0.5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--violet),var(--cyan),var(--pink),var(--violet));
      background-size:300%; animation:borderFlow 4s linear infinite;
    }
    @keyframes borderFlow { from{background-position:0%} to{background-position:300%} }

    /* HEADER */
    .card-head {
      padding:28px 36px 22px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:14px;
    }
    .shield-icon { width:42px; height:42px; flex-shrink:0; }
    .head-eyebrow {
      font-family:'JetBrains Mono',monospace;
      font-size:10px; letter-spacing:3px;
      color:var(--cyan); text-transform:uppercase; margin-bottom:3px;
    }
    .head-title {
      font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
      background:linear-gradient(90deg,var(--cyan),var(--violet));
      -webkit-background-clip:text;background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* STEPS */
    .steps {
      display:flex; padding:18px 36px;
      border-bottom:1px solid var(--border);
      position:relative;
    }
    .steps::after {
      content:''; position:absolute; top:50%; left:36px; right:36px;
      height:1px; background:var(--border); z-index:0; transform:translateY(-50%);
    }
    .step { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; position:relative; z-index:1; }
    .step-dot {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
      border:1px solid rgba(255,255,255,0.1);
      background:var(--card); color:var(--muted); transition:all 0.3s;
    }
    .step.active .step-dot {
      background:rgba(0,245,255,0.15); border-color:var(--cyan); color:var(--cyan);
      box-shadow:0 0 12px rgba(0,245,255,0.3);
    }
    .step.done .step-dot { background:rgba(124,58,237,0.2); border-color:var(--violet); color:var(--violet); }
    .step-label {
      font-family:'JetBrains Mono',monospace; font-size:9px;
      letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; white-space:nowrap;
    }
    .step.active .step-label { color:var(--cyan); }
    .step.done  .step-label  { color:var(--violet); }

    /* FORM BODY */
    .card-body { padding:26px 36px; }
    .form-step { display:flex; flex-direction:column; gap:16px; animation:stepIn 0.3s ease forwards; }
    .form-step.hidden { display:none; }
    @keyframes stepIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }

    /* FIELDS */
    .field { display:flex; flex-direction:column; gap:7px; }
    .field label {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      letter-spacing:2px; color:var(--muted); text-transform:uppercase;
    }
    .field input {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:12px 14px;
      color:var(--text); font-family:'Space Grotesk',sans-serif;
      font-size:14px; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color:rgba(0,245,255,0.4);
      box-shadow:0 0 0 3px rgba(0,245,255,0.06);
    }
    .field input::placeholder { color:rgba(226,232,240,0.2); }
    .field-error {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      color:var(--red); letter-spacing:0.5px; min-height:14px;
    }

    /* PASSWORD */
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:56px; width:100%; }
    .pw-toggle {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px;
      color:var(--muted); cursor:pointer; background:none; border:none; transition:color 0.2s;
    }
    .pw-toggle:hover { color:var(--cyan); }
    .strength-track { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; margin-top:6px; }
    .strength-fill  { height:100%; border-radius:2px; transition:width 0.3s,background 0.3s; width:0%; }
    .strength-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px; margin-top:4px; }

    /* TERMS */
    .terms-row {
      display:flex; align-items:flex-start; gap:10px;
      padding:12px; background:rgba(255,255,255,0.02);
      border:1px solid var(--border); border-radius:8px;
    }
    .terms-row input[type="checkbox"] { width:16px; height:16px; margin-top:1px; accent-color:var(--cyan); cursor:pointer; flex-shrink:0; }
    .terms-row label { font-size:12px; color:var(--muted); cursor:pointer; line-height:1.5; }
    .terms-row a { color:var(--cyan); text-decoration:none; }

    /* CONFIRM BOX */
    .confirm-box {
      background:rgba(0,245,255,0.03); border:1px solid rgba(0,245,255,0.1);
      border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:10px;
    }
    .confirm-row { display:flex; justify-content:space-between; align-items:center; }
    .confirm-key { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
    .confirm-val { font-size:13px; color:var(--text); font-weight:500; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* BUTTONS */
    .btn-row { display:flex; gap:10px; margin-top:6px; }
    .btn-back {
      flex:0 0 auto; padding:13px 18px;
      background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:10px; color:var(--muted); font-size:13px; cursor:pointer; transition:all 0.2s;
    }
    .btn-back:hover { border-color:rgba(255,255,255,0.15); color:var(--text); }
    .btn-next, .btn-submit {
      flex:1; padding:13px;
      background:linear-gradient(135deg,var(--violet),#5b21b6);
      border:none; border-radius:10px; color:white;
      font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(124,58,237,0.3);
    }
    .btn-next:hover, .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,58,237,0.45); }
    .btn-next:disabled, .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    /* STATUS */
    .status-msg {
      font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.5px;
      padding:10px 14px; border-radius:8px; display:none; margin-top:4px;
    }
    .status-msg.error   { background:rgba(255,59,107,0.1); color:var(--red);   border:1px solid rgba(255,59,107,0.2); display:block; }
    .status-msg.success { background:rgba(0,245,196,0.1);  color:var(--green); border:1px solid rgba(0,245,196,0.2);  display:block; }

    /* OTP SCREEN */
    .otp-screen { display:none; padding:32px 36px; }
    .otp-screen.show { display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center; }
    .otp-icon { font-size:48px; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .otp-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
    .otp-sub   { font-size:13px; color:var(--muted); line-height:1.6; }
    .otp-email { color:var(--cyan); font-weight:600; }
    .otp-input {
      width:100%; background:rgba(0,245,255,0.04);
      border:1px solid rgba(0,245,255,0.2); border-radius:12px;
      padding:18px; color:var(--cyan); font-size:36px; font-weight:800;
      text-align:center; letter-spacing:14px;
      font-family:'JetBrains Mono',monospace; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .otp-input:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,245,255,0.1); }
    .otp-msg { font-family:'JetBrains Mono',monospace; font-size:11px; min-height:16px; letter-spacing:0.5px; }
    .btn-verify {
      width:100%; padding:14px;
      background:linear-gradient(135deg,#0891b2,#0e7490);
      border:none; border-radius:10px; color:white;
      font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(0,245,255,0.2);
    }
    .btn-verify:hover  { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,245,255,0.3); }
    .btn-verify:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .btn-resend {
      background:none; border:1px solid var(--border);
      border-radius:8px; padding:9px 20px;
      color:var(--muted); font-size:12px; cursor:pointer; transition:all 0.2s;
    }
    .btn-resend:hover    { border-color:rgba(255,255,255,0.2); color:var(--text); }
    .btn-resend:disabled { opacity:0.4; cursor:not-allowed; }

    /* FOOTER */
    .card-foot {
      padding:16px 36px; border-top:1px solid var(--border);
      text-align:center; font-size:13px; color:var(--muted);
    }
    .card-foot a { color:var(--cyan); text-decoration:none; font-weight:500; }
    .card-foot a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">

  <!-- HEADER -->
  <div class="card-head">
    <svg class="shield-icon" viewBox="0 0 44 44" fill="none">
      <path d="M22 3L5 10V22C5 30.5 12.5 38 22 41C31.5 38 39 30.5 39 22V10L22 3Z"
            stroke="url(#sg)" stroke-width="1.5" fill="rgba(0,245,255,0.05)"/>
      <path d="M15 22L19.5 26.5L29 17" stroke="url(#sg)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00f5ff"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <div>
      <div class="head-eyebrow">// new operator</div>
      <div class="head-title">HoneyShield</div>
    </div>
  </div>

  <!-- STEPS -->
  <div class="steps" id="stepsBar">
    <div class="step active" id="stepDot1">
      <div class="step-dot">01</div>
      <div class="step-label">Identity</div>
    </div>
    <div class="step" id="stepDot2">
      <div class="step-dot">02</div>
      <div class="step-label">Credentials</div>
    </div>
    <div class="step" id="stepDot3">
      <div class="step-dot">03</div>
      <div class="step-label">Confirm</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="card-body" id="formBody">

    <!-- STEP 1 -->
    <div class="form-step" id="step1">
      <div class="field">
        <label>// Operator Name</label>
        <input type="text" id="name" placeholder="Your full name">
        <div class="field-error" id="nameErr"></div>
      </div>
      <div class="field">
        <label>// Operator Email</label>
        <input type="email" id="email" placeholder="you@example.com">
        <div class="field-error" id="emailErr"></div>
      </div>
      <div class="field">
        <label>// Organization</label>
        <input type="text" id="org" placeholder="Your organization or project">
      </div>
      <div class="btn-row">
        <button class="btn-next" onclick="goStep(2)">Next →</button>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="form-step hidden" id="step2">
      <div class="field">
        <label>// Access Key</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Create a strong password">
          <button class="pw-toggle" type="button" onclick="togglePw('password',this)">SHOW</button>
        </div>
        <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="field-error" id="passwordErr"></div>
      </div>
      <div class="field">
        <label>// Confirm Key</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="Confirm your password">
          <button class="pw-toggle" type="button" onclick="togglePw('confirmPassword',this)">SHOW</button>
        </div>
        <div class="field-error" id="confirmErr"></div>
      </div>
      <div class="btn-row">
        <button class="btn-back" onclick="goStep(1)">←</button>
        <button class="btn-next" onclick="goStep(3)">Next →</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="form-step hidden" id="step3">
      <div class="confirm-box" id="confirmBox"></div>
      <div class="terms-row">
        <input type="checkbox" id="terms">
        <label for="terms">
          I agree to the <a href="#">Terms & Conditions</a> and understand
          this is a security monitoring platform.
        </label>
      </div>
      <div class="field-error" id="termsErr"></div>
      <div class="status-msg" id="statusMsg"></div>
      <div class="btn-row">
        <button class="btn-back" onclick="goStep(2)">←</button>
        <button class="btn-submit" id="submitBtn" onclick="submitRegister()">ENROLL OPERATOR</button>
      </div>
    </div>

  </div>

  <!-- OTP SCREEN -->
  <div class="otp-screen" id="otpScreen">
    <div class="otp-icon">📬</div>
    <div class="otp-title">Verify your email</div>
    <div class="otp-sub">
      We sent a 6-digit code to<br>
      <span class="otp-email" id="otpEmailLabel">—</span>
    </div>
    <input class="otp-input" id="otpInput" maxlength="6" placeholder="000000"
           inputmode="numeric"
           oninput="this.value=this.value.replace(/[^0-9]/g,'');
                    if(this.value.length===6) verifyOTP()">
    <div class="otp-msg" id="otpMsg"></div>
    <button class="btn-verify" id="verifyBtn" onclick="verifyOTP()">VERIFY EMAIL</button>
    <button class="btn-resend" id="resendBtn" onclick="resendOTP()">Resend code</button>
  </div>

  <!-- FOOTER -->
  <div class="card-foot">
    Already have an account? <a href="login.html">Sign in →</a>
  </div>

</div>

<script>
// ── MATRIX BG ──────────────────────────────────────────────────────
const mc = document.getElementById('matrix'), mct = mc.getContext('2d');
function resizeMC() { mc.width = innerWidth; mc.height = innerHeight; }
resizeMC(); window.addEventListener('resize', resizeMC);
const chars = '01アイウエオカキクケコ!@#$%^&';
let cols = [];
function initCols() { cols = Array.from({length:Math.floor(mc.width/16)}, () => Math.random()*-mc.height); }
initCols(); window.addEventListener('resize', initCols);
setInterval(() => {
  mct.fillStyle='rgba(3,1,10,.07)'; mct.fillRect(0,0,mc.width,mc.height);
  mct.font='12px JetBrains Mono';
  cols.forEach((y,i) => {
    const a = 0.3+Math.random()*0.4;
    mct.fillStyle = Math.random()>.95 ? `rgba(0,245,255,${a})` : `rgba(124,58,237,${a*0.4})`;
    mct.fillText(chars[Math.floor(Math.random()*chars.length)], i*16, y);
    if (y>mc.height && Math.random()>.975) cols[i]=0;
    cols[i]+=14;
  });
}, 55);

// ── STATE ──────────────────────────────────────────────────────────
let currentStep  = 1;
let pendingEmail = '';

// ── STEP NAVIGATION ────────────────────────────────────────────────
function setStepUI(n) {
  for (let i = 1; i <= 3; i++) {
    document.getElementById(`step${i}`).classList.toggle('hidden', i !== n);
    const dot = document.getElementById(`stepDot${i}`);
    dot.classList.remove('active','done');
    if (i === n) dot.classList.add('active');
    if (i <  n) { dot.classList.add('done'); dot.querySelector('.step-dot').textContent = '✓'; }
    else         dot.querySelector('.step-dot').textContent = `0${i}`;
  }
}

function goStep(n) {
  if (n > currentStep && !validateStep(currentStep)) return;
  currentStep = n;
  if (n === 3) populateConfirm();
  setStepUI(n);
}

// ── VALIDATION ─────────────────────────────────────────────────────
function setErr(id, msg) { document.getElementById(id).textContent = msg; }
function clrErr(id)      { document.getElementById(id).textContent = ''; }

function validateStep(n) {
  if (n === 1) {
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    let ok = true;
    clrErr('nameErr'); clrErr('emailErr');
    if (!name || name.length < 2)                            { setErr('nameErr',  '>> At least 2 characters required'); ok = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr('emailErr', '>> Invalid email address'); ok = false; }
    return ok;
  }
  if (n === 2) {
    const pw  = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    let ok = true;
    clrErr('passwordErr'); clrErr('confirmErr');
    if (!pw || pw.length < 8)  { setErr('passwordErr', '>> Minimum 8 characters'); ok = false; }
    if (!cpw)                   { setErr('confirmErr',  '>> Please confirm password'); ok = false; }
    else if (pw !== cpw)        { setErr('confirmErr',  '>> Passwords do not match'); ok = false; }
    return ok;
  }
  return true;
}

// ── PASSWORD STRENGTH ───────────────────────────────────────────────
document.getElementById('password').addEventListener('input', function () {
  const pw = this.value;
  const fill = document.getElementById('strengthFill');
  const lbl  = document.getElementById('strengthLabel');
  if (!pw) { fill.style.width = '0'; lbl.textContent = ''; return; }
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/\d/.test(pw))   s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  if (s <= 2) {
    fill.style.cssText = 'width:33%;background:#ff3b6b';
    lbl.style.color = '#ff3b6b'; lbl.textContent = '>> WEAK';
  } else if (s <= 3) {
    fill.style.cssText = 'width:66%;background:#f97316';
    lbl.style.color = '#f97316'; lbl.textContent = '>> FAIR';
  } else {
    fill.style.cssText = 'width:100%;background:#00f5c4';
    lbl.style.color = '#00f5c4'; lbl.textContent = '>> STRONG';
  }
});

// ── TOGGLE PASSWORD ─────────────────────────────────────────────────
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'SHOW' : 'HIDE';
}

// ── CONFIRM SUMMARY ─────────────────────────────────────────────────
function populateConfirm() {
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const org   = document.getElementById('org').value.trim();
  document.getElementById('confirmBox').innerHTML = `
    <div class="confirm-row"><span class="confirm-key">Name</span><span class="confirm-val">${name}</span></div>
    <div class="confirm-row"><span class="confirm-key">Email</span><span class="confirm-val">${email}</span></div>
    <div class="confirm-row"><span class="confirm-key">Org</span><span class="confirm-val">${org||'—'}</span></div>
    <div class="confirm-row"><span class="confirm-key">Access Key</span><span class="confirm-val" style="color:var(--green)">●●●●●●●●</span></div>`;
}

// ── SUBMIT ──────────────────────────────────────────────────────────
async function submitRegister() {
  clrErr('termsErr');
  const statusMsg = document.getElementById('statusMsg');
  statusMsg.className = 'status-msg';

  if (!document.getElementById('terms').checked) {
    setErr('termsErr', '>> You must agree to the Terms & Conditions');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'ENROLLING...'; btn.disabled = true;

  const name         = document.getElementById('name').value.trim();
  const email        = document.getElementById('email').value.trim();
  const organization = document.getElementById('org').value.trim();
  const password     = document.getElementById('password').value;

  try {
    const res  = await fetch('http://localhost:3000/api/auth/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, email, organization, password })
    });
    const data = await res.json();

    if (!res.ok) {
      statusMsg.textContent = '>> ' + (data.message || 'Registration failed');
      statusMsg.className   = 'status-msg error';
      btn.textContent = 'ENROLL OPERATOR'; btn.disabled = false;
      return;
    }

    if (data.requiresOTP) {
      pendingEmail = email;
      showOTPScreen(email);
      return;
    }

    statusMsg.textContent = '>> Enrollment successful. Redirecting...';
    statusMsg.className   = 'status-msg success';
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);

  } catch (e) {
    statusMsg.textContent = '>> Server not reachable';
    statusMsg.className   = 'status-msg error';
    btn.textContent = 'ENROLL OPERATOR'; btn.disabled = false;
  }
}

// ── OTP SCREEN ──────────────────────────────────────────────────────
function showOTPScreen(email) {
  document.getElementById('formBody').style.display  = 'none';
  document.getElementById('stepsBar').style.display  = 'none';
  document.getElementById('otpEmailLabel').textContent = email;
  document.getElementById('otpScreen').classList.add('show');
  setTimeout(() => document.getElementById('otpInput').focus(), 100);
}

async function verifyOTP() {
  const otp = document.getElementById('otpInput').value.trim();
  const msg = document.getElementById('otpMsg');
  const btn = document.getElementById('verifyBtn');
  msg.style.color = 'var(--red)'; msg.textContent = '';

  if (!otp || otp.length < 6) { msg.textContent = '>> Enter the 6-digit code'; return; }

  btn.textContent = 'VERIFYING...'; btn.disabled = true;

  try {
    const res  = await fetch('http://localhost:3000/api/auth/verify-otp', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: pendingEmail, otp })
    });
    const data = await res.json();

    if (!res.ok) {
      msg.textContent = '>> ' + (data.message || 'Invalid code');
      btn.textContent = 'VERIFY EMAIL'; btn.disabled = false;
      return;
    }

    msg.style.color = 'var(--green)';
    msg.textContent = '>> Email verified! Redirecting to login...';
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);

  } catch (e) {
    msg.textContent = '>> Server not reachable';
    btn.textContent = 'VERIFY EMAIL'; btn.disabled = false;
  }
}

async function resendOTP() {
  const btn = document.getElementById('resendBtn');
  const msg = document.getElementById('otpMsg');
  btn.textContent = 'Sending...'; btn.disabled = true;
  msg.style.color = 'var(--muted)'; msg.textContent = '';

  try {
    const res  = await fetch('http://localhost:3000/api/auth/resend-otp', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: pendingEmail })
    });
    const data = await res.json();
    msg.style.color   = res.ok ? 'var(--green)' : 'var(--red)';
    msg.textContent   = res.ok ? '>> New code sent!' : ('>> ' + (data.message || 'Failed'));
  } catch { msg.textContent = '>> Server not reachable'; }

  setTimeout(() => { btn.textContent = 'Resend code'; btn.disabled = false; }, 30000);
}
</script>
