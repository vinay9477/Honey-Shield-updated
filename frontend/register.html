<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Honey Shield - Secure Authentication</title>
  <link rel="stylesheet" href="public/css/style.css">
  <style>
    .password-strength-meter {
      display: none;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .password-strength-meter.show {
      display: block;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 3px;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #ef4444;
    }

    .password-strength-bar.fair {
      width: 66%;
      background: #f97316;
    }

    .password-strength-bar.good {
      width: 100%;
      background: #10b981;
    }

    .password-strength-text {
      font-size: 12px;
      margin-top: 4px;
      font-weight: 600;
    }

    .password-strength-text.weak {
      color: #fca5a5;
    }

    .password-strength-text.fair {
      color: #fbcf8c;
    }

    .password-strength-text.good {
      color: #86efac;
    }

    .validation-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <!-- Brand Section -->
      <div class="brand-section">
        <div class="logo">🛡️</div>
        <h1>Honey Shield</h1>
        <p class="tagline">Create Your Security Account</p>
      </div>

      <!-- Form Section -->
      <form class="login-form" id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            required
          >
          <span class="form-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          >
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="org">Organization / Project Name</label>
          <input
            type="text"
            id="org"
            name="org"
            placeholder="Organization or project name"
          >
          <span class="form-error" id="orgError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a strong password"
            required
          >
          <div class="password-strength-meter" id="strengthMeter">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
          <div class="password-strength-text" id="strengthText"></div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm your password"
            required
          >
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <div class="form-group terms-group">
          <label class="terms-checkbox">
            <input type="checkbox" name="terms" required>
            <span>I agree to the <a href="#" class="terms-link">Terms & Conditions</a></span>
          </label>
          <span class="form-error" id="termsError"></span>
        </div>

        <button type="submit" class="login-button">
          <span>Create Account</span>
        </button>

        <div id="msg" class="message"></div>
      </form>

      <!-- Footer Section -->
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="signup-link">Sign in</a></p>
      </div>
    </div>

    <!-- Decorative Background -->
    <div class="bg-decoration"></div>
  </div>

  <script>
    // Password strength checker
    function checkPasswordStrength(password) {
      let strength = 0;
      const feedback = [];

      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/\d/.test(password)) strength++;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

      if (strength <= 1) return { level: 'weak', score: 0.33 };
      if (strength <= 3) return { level: 'fair', score: 0.66 };
      return { level: 'good', score: 1 };
    }

    // Validation functions
    function validateEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function showError(fieldId, message) {
      const errorEl = document.getElementById(fieldId + 'Error');
      if (errorEl) {
        errorEl.textContent = message;
      }
    }

    function clearError(fieldId) {
      const errorEl = document.getElementById(fieldId + 'Error');
      if (errorEl) {
        errorEl.textContent = '';
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("registerForm");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");
      const strengthMeter = document.getElementById("strengthMeter");
      const strengthBar = document.getElementById("strengthBar");
      const strengthText = document.getElementById("strengthText");

      if (!form) {
        console.error("registerForm not found");
        return;
      }

      // Password strength indicator
      if (passwordInput) {
        passwordInput.addEventListener("input", function () {
          clearError("password");
          const password = this.value;

          if (password.length === 0) {
            strengthMeter.classList.remove('show');
            strengthBar.className = 'password-strength-bar';
            strengthText.textContent = '';
            return;
          }

          const strength = checkPasswordStrength(password);
          strengthMeter.classList.add('show');
          strengthBar.className = `password-strength-bar ${strength.level}`;
          strengthText.className = `password-strength-text ${strength.level}`;

          if (strength.level === 'weak') {
            strengthText.textContent = '⚠️ Weak - Add numbers, symbols, or uppercase letters';
          } else if (strength.level === 'fair') {
            strengthText.textContent = '⚠️ Fair - Add more variety to strengthen';
          } else {
            strengthText.textContent = '✓ Strong password';
          }
        });
      }

      // Clear error on confirm password input
      if (confirmInput) {
        confirmInput.addEventListener("input", function () {
          clearError("confirmPassword");
        });
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const organization = document.getElementById("org").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const terms = document.querySelector('input[name="terms"]').checked;
        const msg = document.getElementById("msg");

        let isValid = true;

        // Clear all errors
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

        // Validate name
        if (!name) {
          showError("name", "Full name is required");
          isValid = false;
        } else if (name.length < 2) {
          showError("name", "Name must be at least 2 characters");
          isValid = false;
        }

        // Validate email
        if (!email) {
          showError("email", "Email is required");
          isValid = false;
        } else if (!validateEmail(email)) {
          showError("email", "Please enter a valid email address");
          isValid = false;
        }

        // Validate password
        if (!password) {
          showError("password", "Password is required");
          isValid = false;
        } else if (password.length < 8) {
          showError("password", "Password must be at least 8 characters");
          isValid = false;
        }

        // Validate confirm password
        if (!confirm) {
          showError("confirmPassword", "Please confirm your password");
          isValid = false;
        } else if (password !== confirm) {
          showError("confirmPassword", "Passwords do not match");
          isValid = false;
        }

        // Validate terms
        if (!terms) {
          showError("terms", "You must agree to the Terms & Conditions");
          isValid = false;
        }

        if (!isValid) {
          msg.innerText = "Please fix the errors above";
          msg.className = "message error";
          return;
        }

        try {
          const res = await fetch("http://localhost:3000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              email,
              organization,
              password
            })
          });

          const data = await res.json();

          if (!res.ok) {
            msg.innerText = data.message || "Registration failed";
            msg.className = "message error";
            return;
          }

          msg.innerText = "Registration successful. Redirecting to login...";
          msg.className = "message success";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);

        } catch (err) {
          msg.innerText = "Server not reachable";
          msg.className = "message error";
          console.error("Registration error:", err);
        }
      });
    });
  </script>
</body>
</html>
