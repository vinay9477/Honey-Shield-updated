<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSRF Protection Test</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fef3c7, #fffbeb);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .test-container {
      background: #ffffff;
      width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #fef08a;
      color: #92400e;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
      color: #111827;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    button {
      background: #eab308;
      color: #111;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #ca8a04;
    }

    .info {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }

    .warning {
      margin-top: 10px;
      font-size: 12px;
      color: #b91c1c;
    }

    .success {
      color: #166534;
      background: #dcfce7;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .fail {
      color: #b91c1c;
      background: #fee2e2;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="test-container">

  <span class="badge">CSRF Test Mode</span>

  <h2>🛡️ CSRF Protection Test</h2>

  <p>
    This page tests CSRF (Cross-Site Request Forgery) protection
    using token validation.
  </p>

  <form id="testForm">
    <input type="text" placeholder="Username" value="testuser" required>
    <input type="password" placeholder="Password" value="password123" required>
    <button type="submit">Submit Form (With Token)</button>
  </form>

  <div class="info">
    CSRF token is automatically generated and validated on submit.
  </div>

  <div id="result"></div>

  <div class="warning">
    This test does not affect real users or production data.
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Get userId from localStorage
  function getUserId() {
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    return user._id || user.id || user.email || "ANONYMOUS";
  }

  const form = document.getElementById("testForm");
  const resultDiv = document.getElementById("result");

  // Generate CSRF Token
  function generateCSRFToken() {
    return 'csrf_' + Math.random().toString(36).substr(2, 9);
  }

  const csrfToken = generateCSRFToken();
  const csrfInput = document.createElement('input');
  csrfInput.type = 'hidden';
  csrfInput.name = '_csrf_token';
  csrfInput.value = csrfToken;
  form.appendChild(csrfInput);

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const token = document.querySelector('[name="_csrf_token"]').value;

    if (!token || token.length === 0) {
      resultDiv.className = "fail";
      resultDiv.innerHTML = "<b>✗ CSRF Validation Failed</b><br>No token present!";
      return;
    }

    resultDiv.className = "success";
    resultDiv.innerHTML = "<b>✓ CSRF Token Valid</b><br>Token: " + token.substring(0, 20) + "...<br>Request would be accepted.";

    fetch("http://localhost:3000/api/logs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId: getUserId(),
        ip: "INTERNAL_TEST",
        type: "CSRF_TEST",
        message: "CSRF protection test passed with valid token"
      })
    })
    .catch(err => console.error("Log error:", err));
  });

});
</script>
<script src="public/js/common.js"></script>

</body>
</html>
