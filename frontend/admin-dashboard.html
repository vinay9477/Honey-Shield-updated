<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Honey Shield</title>
  <link rel="stylesheet" href="public/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    .admin-layout {
      padding: 30px;
      background: linear-gradient(135deg, #0f172a 0%, #1a2847 50%, #0f172a 100%);
      min-height: 100vh;
    }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px 25px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .dash-header h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }

    .dash-header button {
      padding: 10px 24px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .dash-header button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 12px 36px rgba(37, 99, 235, 0.2);
      background: rgba(37, 99, 235, 0.1);
    }

    .card h4 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .card p {
      font-size: 32px;
      font-weight: 700;
      color: #60a5fa;
      margin: 12px 0 0 0;
    }

    h3 {
      color: white;
      font-size: 18px;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    thead tr {
      background: rgba(37, 99, 235, 0.15);
    }

    th {
      padding: 16px;
      text-align: left;
      color: #93c5fd;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    td {
      padding: 16px;
      color: #94a3b8;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
    }

    tbody tr:hover {
      background: rgba(37, 99, 235, 0.1);
    }

    .chart-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      margin-bottom: 40px;
    }

    .chart-container h3 {
      margin: 0 0 20px 0;
    }

    .chart-canvas {
      position: relative;
      height: 300px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div class="dash-header">
    <h2>🛡️ Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Stats Cards -->
  <div class="cards">
    <div class="card">
      <h4>Total Users</h4>
      <p id="totalUsers">0</p>
    </div>

    <div class="card">
      <h4>Honeypot Catches</h4>
      <p id="honeypotCount">0</p>
    </div>

    <div class="card">
      <h4>Security Events</h4>
      <p id="totalEvents">0</p>
    </div>

    <div class="card">
      <h4>Threat Level</h4>
      <p id="threatLevel" style="color: #fbbf24;">CRITICAL</p>
    </div>
  </div>

  <!-- Charts Section -->
  <div class="chart-container">
    <h3>📊 System Activity Overview</h3>
    <div class="chart-canvas">
      <canvas id="systemChart"></canvas>
    </div>
  </div>

  <div class="chart-container">
    <h3>🎯 Threat Distribution</h3>
    <div class="chart-canvas">
      <canvas id="threatChart"></canvas>
    </div>
  </div>

  <!-- Users Table -->
  <h3>👥 Registered Users & Activity</h3>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Organization</th>
        <th>Service</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="users"></tbody>
  </table>
</div>

<script>
  // System Activity Chart
  const systemCtx = document.getElementById('systemChart');
  if (systemCtx) {
    new Chart(systemCtx, {
      type: 'bar',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [
          {
            label: 'Successful Auth',
            data: [120, 150, 110, 180, 200, 130, 160],
            backgroundColor: 'rgba(16, 185, 129, 0.6)',
            borderColor: '#10b981',
            borderWidth: 1
          },
          {
            label: 'Failed Attempts',
            data: [30, 45, 20, 50, 35, 25, 40],
            backgroundColor: 'rgba(239, 68, 68, 0.6)',
            borderColor: '#ef4444',
            borderWidth: 1
          },
          {
            label: 'Honeypot Hits',
            data: [5, 8, 3, 12, 7, 4, 6],
            backgroundColor: 'rgba(251, 146, 60, 0.6)',
            borderColor: '#f97316',
            borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: {
              color: '#94a3b8',
              font: { size: 12, weight: 600 }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(255, 255, 255, 0.05)' },
            ticks: { color: '#94a3b8' }
          },
          x: {
            grid: { display: false },
            ticks: { color: '#94a3b8' }
          }
        }
      }
    });
  }

  // Threat Distribution Chart
  const threatCtx = document.getElementById('threatChart');
  if (threatCtx) {
    new Chart(threatCtx, {
      type: 'doughnut',
      data: {
        labels: ['Brute Force', 'SQL Injection', 'XSS Attempts', 'Credential Stuffing', 'DDoS Attempts'],
        datasets: [{
          data: [45, 25, 15, 10, 5],
          backgroundColor: [
            '#ef4444',
            '#f97316',
            '#eab308',
            '#3b82f6',
            '#8b5cf6'
          ],
          borderColor: 'rgba(255, 255, 255, 0.1)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: {
              color: '#94a3b8',
              font: { size: 12, weight: 600 },
              padding: 15
            }
          }
        }
      }
    });
  }

  // Fetch admin dashboard data
  document.addEventListener("DOMContentLoaded", async () => {
    const userData = localStorage.getItem("admin");
    if (!userData) {
      console.warn("No admin found, redirecting to login");
      window.location.href = "admin-login.html";
      return;
    }

    try {
      const response = await fetch("http://localhost:3000/api/users");
      const users = await response.json();

      // Total users
      document.getElementById("totalUsers").innerText = users.length;

      // Total events (count all logs)
      const logsResponse = await fetch("http://localhost:3000/api/logs");
      const logs = logsResponse.ok ? await logsResponse.json() : [];
      document.getElementById("totalEvents").innerText = logs.length;

      // Honeypot catches
      const honeypotCatches = logs.filter(log => log.type === "HONEYPOT").length;
      document.getElementById("honeypotCount").innerText = honeypotCatches;

      // Populate users table
      const usersTableBody = document.getElementById("users");
      usersTableBody.innerHTML = users
        .map(user => `
          <tr>
            <td>${user.email || 'N/A'}</td>
            <td>${user.organization || 'Not Set'}</td>
            <td>${user.service ? user.service.charAt(0).toUpperCase() + user.service.slice(1) : 'None'}</td>
            <td><span style="color: #10b981;">✓ Active</span></td>
          </tr>
        `)
        .join("");
    } catch (error) {
      console.error("Error loading admin dashboard:", error);
    }
  });
</script>
<script src="public/js/admin.js"></script>
<script src="public/js/common.js"></script>

</body>
</html>
