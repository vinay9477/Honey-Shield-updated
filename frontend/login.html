<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Honey Shield - Secure Authentication</title>
  <link rel="stylesheet" href="public/css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <!-- Brand Section -->
      <div class="brand-section">
        <div class="logo">🛡️</div>
        <h1>Honey Shield</h1>
        <p class="tagline">Advanced Security Authentication</p>
      </div>

      <!-- Form Section -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          >
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            >
            <button
              type="button"
              class="password-toggle"
              onclick="togglePassword('password', this)"
              aria-label="Toggle password visibility"
            >
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-button" onclick="login(); return false;">
          <span>Sign In</span>
        </button>

        <div id="msg" class="message"></div>
      </form>

      <!-- Footer Section -->
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html" class="signup-link">Create one</a></p>
      </div>
    </div>

    <!-- Decorative Background -->
    <div class="bg-decoration"></div>
  </div>

  <script src="public/js/login.js"></script>
</body>
</html>
