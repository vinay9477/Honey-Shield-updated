<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XSS Protection Test</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fef2f2, #fef8f7);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .test-container {
      background: #ffffff;
      width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #fee2e2;
      color: #991b1b;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
      color: #111827;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: monospace;
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #991b1b;
    }

    .info {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }

    .warning {
      margin-top: 10px;
      font-size: 12px;
      color: #b91c1c;
    }

    .success {
      color: #166534;
      background: #dcfce7;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="test-container">

  <span class="badge">XSS Attack Test Mode</span>

  <h2>🔒 XSS Protection Test</h2>

  <p>
    This page tests XSS (Cross-Site Scripting) protection.
    Try injecting script tags or malicious HTML.
  </p>

  <form id="testForm">
    <textarea placeholder="Try: <img src=x onerror='alert(1)'> or <script>alert('XSS')</script>" required></textarea>
    <button type="submit">Test XSS Input</button>
  </form>

  <div class="info">
    Blocked patterns: &lt;script&gt;, &lt;iframe&gt;, onerror, onclick, javascript:
  </div>

  <div id="result"></div>

  <div class="warning">
    This test does not affect real users or production data.
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Get userId from localStorage
  function getUserId() {
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    return user._id || user.id || user.email || "ANONYMOUS";
  }

  const form = document.getElementById("testForm");
  const resultDiv = document.getElementById("result");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const textarea = document.querySelector("textarea");
    const userInput = textarea.value;

    // Test for XSS patterns
    const xssPatterns = /<|>|script|iframe|onclick|onerror|javascript:/i;

    if (xssPatterns.test(userInput)) {
      resultDiv.className = "warning";
      resultDiv.innerHTML = "<b>✓ XSS Attack Detected!</b><br>Malicious payload blocked successfully.";

      fetch("http://localhost:3000/api/logs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId: getUserId(),
          ip: "INTERNAL_TEST",
          type: "XSS_ATTACK",
          message: "XSS injection attempt detected: " + userInput.substring(0, 50)
        })
      })
      .catch(err => console.error("Log error:", err));

    } else {
      resultDiv.className = "success";
      resultDiv.innerHTML = "<b>✓ Safe Input</b><br>No XSS patterns detected.";
    }
  });

});
</script>
<script src="public/js/common.js"></script>

</body>
</html>
